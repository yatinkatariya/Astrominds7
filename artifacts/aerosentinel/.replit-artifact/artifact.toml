kind = "web"
previewPath = "/"
title = "AeroSentinel — ISRO Air Quality Intelligence"
version = "1.0.0"
id = "artifacts/aerosentinel"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18273

[services.development]
run = "pnpm --filter @workspace/aerosentinel run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/aerosentinel", "run", "build" ]
publicDir = "artifacts/aerosentinel/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18273"
BASE_PATH = "/"
